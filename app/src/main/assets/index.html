<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>b-map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;width:100%;font-family:system-ui,-apple-system,Segoe UI,sans-serif}body{background:radial-gradient(circle at top,#174569 0%,#0b1725 52%,#04070c 100%);overflow:hidden;color:#eff8ff}.app{height:100vh;padding:12px;display:flex;flex-direction:column;gap:12px}.topbar{height:auto;display:flex;gap:12px;align-items:center;padding:13px;border-radius:26px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);box-shadow:0 18px 35px rgba(0,0,0,.35);backdrop-filter:blur(14px)}.brand{display:flex;align-items:center;gap:10px;min-width:max-content}.logo{width:46px;height:46px;border-radius:17px;background:linear-gradient(135deg,#68d8ff,#50ff9d);display:grid;place-items:center;font-size:25px;box-shadow:0 10px 25px rgba(80,255,157,.18)}h1{font-size:1.55rem;letter-spacing:-.05em;color:#eff8ff}.sub{font-size:.78rem;color:#a8c7d9}.search{flex:1;display:flex;height:46px;border-radius:999px;background:rgba(4,12,22,.75);border:1px solid rgba(160,220,255,.25);overflow:hidden}input{flex:1;border:0;outline:0;background:transparent;color:#eff8ff;padding:0 15px;font-size:15px}input::placeholder{color:#86aabc}.go{border:0;background:#0b84ff;color:white;font-weight:800;padding:0 16px}.map-shell{position:relative;flex:1;overflow:hidden;border-radius:32px;background:rgba(7,19,30,.9);border:1px solid rgba(255,255,255,.14);box-shadow:0 30px 70px rgba(0,0,0,.5),inset 0 0 0 1px rgba(255,255,255,.04)}#map{height:100%;width:100%;background:#07131e}.leaflet-container{background:#07131e;filter:saturate(.92) brightness(.86) contrast(1.08)}.leaflet-tile{filter:saturate(.85) brightness(.78) hue-rotate(175deg) contrast(1.08)}.leaflet-control-zoom{border:0!important;box-shadow:0 10px 25px rgba(0,0,0,.35)!important}.leaflet-control-zoom a{background:rgba(8,22,34,.92)!important;color:#f4fbff!important;border:1px solid rgba(255,255,255,.12)!important}.fab{position:absolute;right:14px;z-index:999;width:48px;height:48px;border-radius:18px;background:rgba(8,22,34,.88);border:1px solid rgba(255,255,255,.14);color:#eff8ff;display:grid;place-items:center;box-shadow:0 12px 28px rgba(0,0,0,.38);font-size:22px}.locate{bottom:96px}.home{bottom:40px}.panel{position:absolute;left:14px;right:14px;bottom:14px;z-index:998;background:rgba(5,15,25,.78);border:1px solid rgba(255,255,255,.13);border-radius:22px;padding:12px 14px;box-shadow:0 16px 35px rgba(0,0,0,.38);backdrop-filter:blur(12px);color:#eff8ff}.panel b{display:block;font-size:16px}.panel small{display:block;margin-top:4px;color:#a8c7d9}.pin{font-size:28px;text-shadow:0 4px 10px rgba(0,0,0,.45)}.me{width:22px;height:22px;border-radius:50%;background:#0b84ff;border:4px solid white;box-shadow:0 0 0 8px rgba(11,132,255,.22),0 6px 18px rgba(0,0,0,.45)}#login{position:fixed;inset:0;z-index:9999;background:radial-gradient(circle at top,#174569,#04070c);display:grid;place-items:center;padding:22px}.login-card{width:100%;max-width:360px;border-radius:28px;padding:22px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.16);box-shadow:0 30px 80px rgba(0,0,0,.45)}.login-card h2{font-size:30px;margin-bottom:8px}.login-card p{color:#b9d2df;margin-bottom:16px}.login-card button,.mini-btn{border:0;border-radius:999px;padding:10px 14px;background:#0b84ff;color:white;font-weight:800;margin:5px}.mini-btn.gray,.login-card .gray{background:rgba(255,255,255,.14)}.history{margin-top:10px;max-height:100px;overflow:auto}.history button{display:block;width:100%;text-align:left;border:0;border-radius:12px;padding:8px;margin-top:5px;background:rgba(255,255,255,.1);color:#dcefff}@media(max-width:650px){.topbar{flex-direction:column;align-items:stretch;border-radius:22px}.brand{width:max-content}.map-shell{border-radius:25px}}
</style>
</head>
<body>
<div id="login"><div class="login-card"><h2>🌍 b-map</h2><p>Continue as Guest to keep Home and search history on this phone.</p><button id="guestBtn">Continue as Guest</button></div></div>
<div class="app">
<header class="topbar">
  <div class="brand"><div class="logo">🌍</div><div><h1>b-map</h1><div class="sub">dark blue global map</div></div></div>
  <form class="search" id="searchForm"><input id="searchBox" placeholder="Search places, cities, streets..."><button class="go">Go</button></form>
</header>
<main class="map-shell">
  <div id="map"></div>
  <button class="fab locate" id="locateBtn">⌖</button>
  <button class="fab home" id="homeBtn">⌂</button>
  <div class="panel"><b id="placeTitle">Ready</b><small id="placeInfo">Search a place, tap a point, or set Home manually.</small></div>
</main>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const login=document.getElementById('login');
if(localStorage.getItem('bmap_signed_in')==='yes')login.style.display='none';
document.getElementById('guestBtn').onclick=()=>{localStorage.setItem('bmap_signed_in','yes');localStorage.setItem('bmap_user','Guest');login.style.display='none'};
const map=L.map('map',{zoomControl:true}).setView([20,0],2);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'}).addTo(map);
const title=document.getElementById('placeTitle'),info=document.getElementById('placeInfo'),box=document.getElementById('searchBox');let marker=null;let meMarker=null;let lastPlaceName='Dropped pin',lastPlaceDesc='Custom map point';
const pinIcon=L.divIcon({className:'',html:'<div class="pin">📍</div>',iconSize:[32,32],iconAnchor:[16,30]});
const meIcon=L.divIcon({className:'',html:'<div class="me"></div>',iconSize:[30,30],iconAnchor:[15,15]});
let HOME=null;try{HOME=JSON.parse(localStorage.getItem('bmap_home')||'null')}catch(e){HOME=null}
let HISTORY=[];try{HISTORY=JSON.parse(localStorage.getItem('bmap_history')||'[]')}catch(e){HISTORY=[]}
const saved=[['Atlanta',33.749,-84.388],['Beijing',39.904,116.407],['London',51.507,-.128],['Paris',48.856,2.352],['Tokyo',35.676,139.65],['Sydney',-33.868,151.209],['Auburn',32.609,-85.48]];
if(HOME&&HOME.lat)saved.push(['Home',HOME.lat,HOME.lon]);
saved.forEach(p=>L.marker([p[1],p[2]],{icon:pinIcon}).addTo(map).bindPopup('<b>'+p[0]+'</b>'));
function setMarker(lat,lon,name,desc){lastPlaceName=name;lastPlaceDesc=desc;if(marker)map.removeLayer(marker);marker=L.marker([lat,lon],{icon:pinIcon}).addTo(map).bindPopup('<b>'+name+'</b><br>'+desc).openPopup();title.textContent=name;info.textContent=desc+' · '+lat.toFixed(5)+', '+lon.toFixed(5);map.setView([lat,lon],17)}
function setMe(lat,lon,acc){if(meMarker)map.removeLayer(meMarker);meMarker=L.marker([lat,lon],{icon:meIcon}).addTo(map).bindPopup('<b>You are here</b><br>Accuracy '+Math.round(acc||0)+' m').openPopup();title.textContent='You are here';info.textContent='Android GPS · '+lat.toFixed(5)+', '+lon.toFixed(5);map.setView([lat,lon],16)}
window.nativeLocationResult=function(lat,lon,acc){setMe(lat,lon,acc)};
window.nativeLocationError=function(){title.textContent='Location unavailable';info.textContent='Turn on GPS/location services, then try again.'};
function fixQuery(q){let s=q.toLowerCase().trim();s=s.replace(/\bme\b/g,'ne').replace(/\bav\b/g,'ave').replace(/\bavenue\b/g,'ave').replace(/\bgeorga\b/g,'georgia').replace(/\bgeo\b/g,'georgia').replace(/\batl\b/g,'atlanta').replace(/greenwo+d/g,'greenwood').replace(/\s+/g,' ');return s;}
function saveHistory(q){if(!q||q==='home')return;HISTORY=[q,...HISTORY.filter(x=>x!==q)].slice(0,6);localStorage.setItem('bmap_history',JSON.stringify(HISTORY));renderHistory()}
function renderHistory(){let boxH=document.getElementById('histBox');if(!boxH){boxH=document.createElement('div');boxH.id='histBox';boxH.className='history';document.querySelector('.panel').appendChild(boxH)}boxH.innerHTML=HISTORY.length?'<b>Search history</b>':'';HISTORY.forEach(q=>{const b=document.createElement('button');b.textContent=q;b.onclick=()=>searchPlace(q);boxH.appendChild(b)})}
async function searchPlace(raw){const q=fixQuery(raw);box.value=q;if(q==='home'){if(HOME&&HOME.lat){setMarker(HOME.lat,HOME.lon,'Home',HOME.addr||'Manual home');return}else{title.textContent='Home not set';info.textContent='Search/tap a place first, then tap Set Home.';return}}title.textContent='Searching...';info.textContent=q;try{const url='https://nominatim.openstreetmap.org/search?format=json&limit=1&q='+encodeURIComponent(q);const r=await fetch(url,{headers:{Accept:'application/json'}});const data=await r.json();if(!data.length){title.textContent='Not found';info.textContent='Try street, city, state.';return}saveHistory(q);const p=data[0];setMarker(parseFloat(p.lat),parseFloat(p.lon),p.display_name.split(',')[0],p.display_name)}catch(e){title.textContent='Search failed';info.textContent='Check internet connection.'}}
function setHomeManual(){let p=null;if(marker)p=marker.getLatLng();else if(meMarker)p=meMarker.getLatLng();if(!p){title.textContent='No place selected';info.textContent='Search or tap a place first, then tap Set Home.';return}HOME={name:'Home',addr:lastPlaceDesc||'Manual home',lat:p.lat,lon:p.lng};localStorage.setItem('bmap_home',JSON.stringify(HOME));title.textContent='Home saved';info.textContent='Manual Home set to '+HOME.lat.toFixed(5)+', '+HOME.lon.toFixed(5)}
function logout(){localStorage.removeItem('bmap_signed_in');localStorage.removeItem('bmap_user');localStorage.removeItem('bmap_home');localStorage.removeItem('bmap_history');location.reload()}
const panel=document.querySelector('.panel');const setHomeBtn=document.createElement('button');setHomeBtn.textContent='Set Home';setHomeBtn.className='mini-btn gray';panel.appendChild(setHomeBtn);setHomeBtn.onclick=setHomeManual;const logoutBtn=document.createElement('button');logoutBtn.textContent='Logout';logoutBtn.className='mini-btn gray';panel.appendChild(logoutBtn);logoutBtn.onclick=logout;renderHistory();
document.getElementById('searchForm').onsubmit=e=>{e.preventDefault();const q=box.value.trim();if(q)searchPlace(q)};
document.getElementById('homeBtn').onclick=()=>{if(HOME&&HOME.lat){setMarker(HOME.lat,HOME.lon,'Home',HOME.addr||'Manual home')}else{title.textContent='Home not set';info.textContent='Search/tap a place first, then tap Set Home.'}};
document.getElementById('locateBtn').onclick=()=>{title.textContent='Locating...';info.textContent='Using Android GPS.';if(window.AndroidLocation){AndroidLocation.requestLocation()}else{window.nativeLocationError()}};
map.on('click',e=>setMarker(e.latlng.lat,e.latlng.lng,'Dropped pin','Custom map point'));
</script>
<script src="nav.js"></script>
</body>
</html>
