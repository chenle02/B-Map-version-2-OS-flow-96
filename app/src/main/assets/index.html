<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>b-map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;width:100%;font-family:system-ui,-apple-system,Segoe UI,sans-serif}body{background:radial-gradient(circle at top,#174569 0%,#0b1725 52%,#04070c 100%);overflow:hidden;color:#eff8ff}.app{height:100vh;padding:12px;display:flex;flex-direction:column;gap:12px}.topbar{height:auto;display:flex;gap:12px;align-items:center;padding:13px;border-radius:26px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);box-shadow:0 18px 35px rgba(0,0,0,.35);backdrop-filter:blur(14px)}.brand{display:flex;align-items:center;gap:10px;min-width:max-content}.logo{width:46px;height:46px;border-radius:17px;background:linear-gradient(135deg,#68d8ff,#50ff9d);display:grid;place-items:center;font-size:25px;box-shadow:0 10px 25px rgba(80,255,157,.18)}h1{font-size:1.55rem;letter-spacing:-.05em;color:#eff8ff}.sub{font-size:.78rem;color:#a8c7d9}.search{flex:1;display:flex;height:46px;border-radius:999px;background:rgba(4,12,22,.75);border:1px solid rgba(160,220,255,.25);overflow:hidden}input{flex:1;border:0;outline:0;background:transparent;color:#eff8ff;padding:0 15px;font-size:15px}input::placeholder{color:#86aabc}.go{border:0;background:#0b84ff;color:white;font-weight:800;padding:0 16px}.map-shell{position:relative;flex:1;overflow:hidden;border-radius:32px;background:rgba(7,19,30,.9);border:1px solid rgba(255,255,255,.14);box-shadow:0 30px 70px rgba(0,0,0,.5),inset 0 0 0 1px rgba(255,255,255,.04)}#map{height:100%;width:100%;background:#07131e}.leaflet-container{background:#07131e;filter:saturate(.92) brightness(.86) contrast(1.08)}.leaflet-tile{filter:saturate(.85) brightness(.78) hue-rotate(175deg) contrast(1.08)}.leaflet-control-zoom{border:0!important;box-shadow:0 10px 25px rgba(0,0,0,.35)!important}.leaflet-control-zoom a{background:rgba(8,22,34,.92)!important;color:#f4fbff!important;border:1px solid rgba(255,255,255,.12)!important}.fab{position:absolute;right:14px;z-index:999;width:48px;height:48px;border-radius:18px;background:rgba(8,22,34,.88);border:1px solid rgba(255,255,255,.14);color:#eff8ff;display:grid;place-items:center;box-shadow:0 12px 28px rgba(0,0,0,.38);font-size:22px}.locate{bottom:96px}.home{bottom:40px}.panel{position:absolute;left:14px;right:14px;bottom:14px;z-index:998;background:rgba(5,15,25,.78);border:1px solid rgba(255,255,255,.13);border-radius:22px;padding:12px 14px;box-shadow:0 16px 35px rgba(0,0,0,.38);backdrop-filter:blur(12px);color:#eff8ff}.panel b{display:block;font-size:16px}.panel small{display:block;margin-top:4px;color:#a8c7d9}.pin{font-size:28px;text-shadow:0 4px 10px rgba(0,0,0,.45)}@media(max-width:650px){.topbar{flex-direction:column;align-items:stretch;border-radius:22px}.brand{width:max-content}.map-shell{border-radius:25px}}
</style>
</head>
<body>
<div class="app">
<header class="topbar">
  <div class="brand"><div class="logo">🌍</div><div><h1>b-map</h1><div class="sub">dark blue global map</div></div></div>
  <form class="search" id="searchForm"><input id="searchBox" placeholder="Search places, cities, streets..."><button class="go">Go</button></form>
</header>
<main class="map-shell">
  <div id="map"></div>
  <button class="fab locate" id="locateBtn">⌖</button>
  <button class="fab home" id="homeBtn">⌂</button>
  <div class="panel"><b id="placeTitle">Ready</b><small id="placeInfo">Drag, zoom, search, tap to drop a pin, or use location.</small></div>
</main>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map=L.map('map',{zoomControl:true}).setView([20,0],2);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'}).addTo(map);
const title=document.getElementById('placeTitle'),info=document.getElementById('placeInfo');let marker=null;
const customIcon=L.divIcon({className:'',html:'<div class="pin">📍</div>',iconSize:[32,32],iconAnchor:[16,30]});
const saved=[['Atlanta',33.749,-84.388],['Beijing',39.904,116.407],['London',51.507,-.128],['Paris',48.856,2.352],['Tokyo',35.676,139.65],['Sydney',-33.868,151.209],['Auburn',32.609,-85.48]];
saved.forEach(p=>L.marker([p[1],p[2]],{icon:customIcon}).addTo(map).bindPopup('<b>'+p[0]+'</b>'));
function setMarker(lat,lon,name,desc){if(marker)map.removeLayer(marker);marker=L.marker([lat,lon],{icon:customIcon}).addTo(map).bindPopup('<b>'+name+'</b><br>'+desc).openPopup();title.textContent=name;info.textContent=desc+' · '+lat.toFixed(5)+', '+lon.toFixed(5);map.setView([lat,lon],14)}
async function searchPlace(q){title.textContent='Searching...';info.textContent=q;try{const url='https://nominatim.openstreetmap.org/search?format=json&limit=1&q='+encodeURIComponent(q);const r=await fetch(url,{headers:{Accept:'application/json'}});const data=await r.json();if(!data.length){title.textContent='Not found';info.textContent='Try another search.';return}const p=data[0];setMarker(parseFloat(p.lat),parseFloat(p.lon),p.display_name.split(',')[0],p.display_name)}catch(e){title.textContent='Search failed';info.textContent='Check internet connection.'}}
document.getElementById('searchForm').onsubmit=e=>{e.preventDefault();const q=document.getElementById('searchBox').value.trim();if(q)searchPlace(q)};
document.getElementById('homeBtn').onclick=()=>{map.setView([20,0],2);title.textContent='World view';info.textContent='Dark blue OpenStreetMap global map'};
document.getElementById('locateBtn').onclick=()=>{title.textContent='Locating...';info.textContent='Allow location permission if asked.';map.locate({setView:true,maxZoom:16,enableHighAccuracy:true})};
map.on('locationfound',e=>setMarker(e.latlng.lat,e.latlng.lng,'You are here','Current device location'));
map.on('locationerror',()=>{title.textContent='Location unavailable';info.textContent='Permission denied or GPS unavailable.'});
map.on('click',e=>setMarker(e.latlng.lat,e.latlng.lng,'Dropped pin','Custom map point'));
</script>
</body>
</html>
