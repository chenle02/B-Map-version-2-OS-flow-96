<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>b-map</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{height:100vh;background:radial-gradient(circle at top,#174569,#07111d 60%,#03060a);font-family:system-ui;color:#eff8ff;overflow:hidden}.app{height:100vh;display:flex;flex-direction:column;gap:12px;padding:12px}.top{display:flex;gap:12px;align-items:center;justify-content:space-between;padding:13px;border-radius:24px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14)}.brand{display:flex;align-items:center;gap:10px}.logo{width:44px;height:44px;border-radius:16px;background:linear-gradient(135deg,#68d8ff,#50ff9d);display:grid;place-items:center;font-size:25px}h1{font-size:1.5rem}p{font-size:.8rem;color:#a8c7d9}input{flex:1;max-width:520px;padding:12px 15px;border-radius:999px;border:1px solid rgba(160,220,255,.25);background:rgba(4,12,22,.75);color:#eff8ff;outline:0}.map{position:relative;flex:1;border-radius:28px;overflow:hidden;background:#07131e;border:1px solid rgba(255,255,255,.14);box-shadow:0 25px 60px rgba(0,0,0,.5)}canvas{width:100%;height:100%;display:block}.controls{position:absolute;top:14px;right:14px;display:flex;flex-direction:column;gap:8px}button{width:45px;height:45px;border:0;border-radius:16px;background:rgba(8,22,34,.85);color:#fff;font-size:1.25rem;font-weight:800}.info{position:absolute;left:14px;right:14px;bottom:14px;display:flex;gap:10px}.box{flex:1;padding:11px 13px;border-radius:20px;background:rgba(5,15,25,.78);border:1px solid rgba(255,255,255,.13)}.box span{display:block;color:#8fb3c6;font-size:.72rem;text-transform:uppercase;letter-spacing:.08em}.box strong{display:block;margin-top:3px}.popup{position:absolute;display:none;transform:translate(-50%,-130%);padding:10px 12px;border-radius:15px;background:#07131e;border:1px solid rgba(255,255,255,.16);box-shadow:0 16px 35px rgba(0,0,0,.45);z-index:10;min-width:140px}.popup b{display:block}.popup small{color:#a8c7d9}@media(max-width:650px){.top{flex-direction:column;align-items:stretch}.info{flex-direction:column}}
</style>
</head>
<body>
<div class="app"><header class="top"><div class="brand"><div class="logo">🌍</div><div><h1>b-map</h1><p>custom global map</p></div></div><input id="search" placeholder="Search: Atlanta, Beijing, London..."></header><main class="map"><canvas id="c"></canvas><div class="controls"><button id="zin">+</button><button id="zout">−</button><button id="home">⌂</button></div><div id="pop" class="popup"></div><div class="info"><div class="box"><span>Pointer</span><strong id="coords">Move on map</strong></div><div class="box"><span>Selected</span><strong id="sel">None</strong></div></div></main></div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d'),coords=document.getElementById('coords'),sel=document.getElementById('sel'),pop=document.getElementById('pop'),search=document.getElementById('search');let W=0,H=0,z=1,ox=0,oy=0,drag=false,lx=0,ly=0;const land=[[[-170,72],[-140,70],[-105,58],[-75,50],[-55,55],[-60,70],[-95,78],[-140,78]],[[-125,48],[-100,20],[-88,15],[-78,8],[-82,-5],[-98,8],[-116,25],[-130,42]],[[-82,12],[-65,10],[-50,-5],[-45,-25],[-58,-55],[-73,-50],[-78,-20],[-86,0]],[[-10,36],[20,35],[35,15],[30,-35],[15,-35],[0,-15],[-15,5],[-18,25]],[[-10,60],[30,65],[65,55],[95,60],[130,50],[155,60],[170,45],[130,25],[80,25],[45,35],[10,45]],[[35,30],[75,25],[100,10],[110,-5],[95,-10],[70,5],[45,10]],[[110,-10],[155,-10],[155,-45],[115,-42],[105,-25]],[[-45,80],[-20,75],[-15,60],[-40,58],[-55,68]],[[-180,-70],[-120,-72],[-60,-70],[0,-72],[60,-70],[120,-72],[180,-70],[180,-85],[-180,-85]]];const cities=[['Atlanta',33.749,-84.388,'USA'],['Beijing',39.904,116.407,'China'],['London',51.507,-.128,'UK'],['Paris',48.856,2.352,'France'],['Tokyo',35.676,139.65,'Japan'],['Sydney',-33.868,151.209,'Australia'],['Cairo',30.044,31.236,'Egypt'],['Rio',-22.906,-43.172,'Brazil'],['Cape Town',-33.925,18.424,'South Africa'],['Vancouver',49.282,-123.121,'Canada'],['New York',40.712,-74.006,'USA'],['Auburn',32.609,-85.48,'USA']];function resize(){const b=canvas.parentElement.getBoundingClientRect(),d=window.devicePixelRatio||1;W=b.width;H=b.height;canvas.width=W*d;canvas.height=H*d;canvas.style.width=W+'px';canvas.style.height=H+'px';ctx.setTransform(d,0,0,d,0,0);draw()}function sc(){return Math.min(W/360,H/180)*.92*z}function pr(lon,lat){const s=sc();return[W/2+lon*s+ox,H/2-lat*s+oy]}function un(x,y){const s=sc();return[(x-W/2-ox)/s,(H/2+oy-y)/s]}function bg(){ctx.clearRect(0,0,W,H);const g=ctx.createRadialGradient(W*.5,H*.45,20,W*.5,H*.5,Math.max(W,H));g.addColorStop(0,'#103354');g.addColorStop(1,'#04101c');ctx.fillStyle=g;ctx.fillRect(0,0,W,H)}function grid(){ctx.lineWidth=1;ctx.strokeStyle='rgba(170,225,255,.13)';for(let lon=-180;lon<=180;lon+=30){let a=pr(lon,-85),b=pr(lon,85);ctx.beginPath();ctx.moveTo(a[0],a[1]);ctx.lineTo(b[0],b[1]);ctx.stroke()}for(let lat=-60;lat<=60;lat+=30){let a=pr(-180,lat),b=pr(180,lat);ctx.beginPath();ctx.moveTo(a[0],a[1]);ctx.lineTo(b[0],b[1]);ctx.stroke()}}function drawLand(){for(const poly of land){ctx.beginPath();poly.forEach((p,i)=>{let a=pr(p[0],p[1]);i?ctx.lineTo(a[0],a[1]):ctx.moveTo(a[0],a[1])});ctx.closePath();let g=ctx.createLinearGradient(0,0,W,H);g.addColorStop(0,'rgba(80,255,157,.45)');g.addColorStop(1,'rgba(75,184,255,.35)');ctx.fillStyle=g;ctx.fill();ctx.strokeStyle='rgba(220,255,240,.48)';ctx.stroke()}}function markers(){for(const c of cities){let a=pr(c[2],c[1]);ctx.beginPath();ctx.arc(a[0],a[1],7,0,Math.PI*2);ctx.fillStyle='#fbbf5a';ctx.fill();ctx.strokeStyle='#fff4ce';ctx.lineWidth=2;ctx.stroke();if(z>1.15){ctx.fillStyle='#f5fbff';ctx.font='12px system-ui';ctx.fillText(c[0],a[0]+10,a[1]-10)}}}function draw(){bg();grid();drawLand();markers()}function pos(e){const r=canvas.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top}}function near(x,y){for(const c of cities){let a=pr(c[2],c[1]),dx=a[0]-x,dy=a[1]-y;if(Math.sqrt(dx*dx+dy*dy)<14)return c}return null}function show(c){let a=pr(c[2],c[1]);pop.style.left=a[0]+'px';pop.style.top=a[1]+'px';pop.innerHTML='<b>'+c[0]+'</b><small>'+c[3]+'<br>'+c[1].toFixed(2)+'°, '+c[2].toFixed(2)+'°</small>';pop.style.display='block';sel.textContent=c[0]}canvas.onmousedown=e=>{drag=true;let p=pos(e);lx=p.x;ly=p.y};canvas.onmouseup=()=>drag=false;canvas.onmouseleave=()=>drag=false;canvas.onmousemove=e=>{let p=pos(e);if(drag){ox+=p.x-lx;oy+=p.y-ly;lx=p.x;ly=p.y;pop.style.display='none';draw();return}let ll=un(p.x,p.y);coords.textContent=ll[1].toFixed(2)+'°, '+ll[0].toFixed(2)+'°'};canvas.onclick=e=>{let p=pos(e),c=near(p.x,p.y);c?show(c):(pop.style.display='none',sel.textContent='None')};document.getElementById('zin').onclick=()=>{z=Math.min(5,z*1.2);draw()};document.getElementById('zout').onclick=()=>{z=Math.max(.75,z/1.2);draw()};document.getElementById('home').onclick=()=>{z=1;ox=0;oy=0;sel.textContent='None';pop.style.display='none';draw()};search.onkeydown=e=>{if(e.key!=='Enter')return;let q=search.value.toLowerCase(),c=cities.find(x=>x[0].toLowerCase().includes(q));if(!c){sel.textContent='Not found';return}let a=pr(c[2],c[1]);ox+=W/2-a[0];oy+=H/2-a[1];z=Math.max(1.5,z);draw();show(c)};window.onresize=resize;resize();
</script>
</body>
</html>
